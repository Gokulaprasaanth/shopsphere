spring.application.name=ecommerce-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=postgres
# Production deployments MUST override DB_PASSWORD and JWT_SECRET via environment variables.
spring.datasource.password=${DB_PASSWORD:post123}

app.jwtSecret=${JWT_SECRET:secretKey12345secretKey12345secretKey12345secretKey12345}
app.jwtExpirationMs=86400000
app.jwtRefreshExpirationMs=604800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=8080

logging.level.org.springframework.security=INFO